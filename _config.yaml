url: "https://gray-rice.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

paginate: 5
paginate_path: "/blog/page:num/"

defaults:
  - scope:
      path: ""
    values:
      layout: default